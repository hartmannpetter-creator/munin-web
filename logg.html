<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Munin — fremgang</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#0a0e1a;--night-2:#0f1524;--ice:#e8edf5;--ice-dim:#8b95a8;
    --raven:#5b7c9d;--raven-glow:#7da3cc;--ember:#c9a25e;
    --line:rgba(123,140,168,0.14);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{background:var(--night);color:var(--ice);font-family:'Inter',sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:980px;margin:0 auto;padding:0 28px}
  .mono{font-family:'JetBrains Mono',monospace;letter-spacing:0.02em}

  /* top nav */
  .topnav{
    display:flex;justify-content:space-between;align-items:center;
    padding:26px 28px;max-width:980px;margin:0 auto;
    border-bottom:1px solid var(--line);
  }
  .topnav-brand{font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.22em;color:var(--ice)}
  .topnav-link{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--ice-dim);text-decoration:none;letter-spacing:0.06em;transition:color 0.3s}
  .topnav-link:hover{color:var(--raven-glow)}

  /* header */
  .loghead{padding:80px 0 50px}
  .loghead .eyebrow{font-family:'JetBrains Mono',monospace;font-size:12px;text-transform:uppercase;letter-spacing:0.22em;color:var(--raven);margin-bottom:18px}
  .loghead h1{font-family:'Fraunces',serif;font-weight:500;font-size:clamp(40px,6.5vw,68px);line-height:1.0;letter-spacing:-0.02em;margin-bottom:20px}
  .loghead h1 em{font-style:italic;color:var(--raven-glow)}
  .loghead p{color:var(--ice-dim);font-size:18px;max-width:560px}

  /* filter */
  .filters{display:flex;gap:10px;margin:36px 0 10px;flex-wrap:wrap}
  .filter{
    font-family:'JetBrains Mono',monospace;font-size:12px;
    color:var(--ice-dim);background:transparent;
    border:1px solid var(--line);border-radius:100px;
    padding:7px 16px;cursor:pointer;transition:all 0.25s;letter-spacing:0.04em;
  }
  .filter:hover{border-color:var(--raven)}
  .filter.active{background:var(--raven-glow);color:var(--night);border-color:var(--raven-glow)}

  /* timeline */
  .timeline{padding:30px 0 100px;position:relative}
  .timeline::before{
    content:'';position:absolute;left:11px;top:40px;bottom:60px;width:1px;
    background:linear-gradient(180deg,var(--line),transparent);
  }
  .entry{
    position:relative;padding-left:48px;margin-bottom:14px;
    transition:opacity 0.4s, transform 0.4s;
  }
  .entry::before{
    content:'';position:absolute;left:5px;top:30px;
    width:13px;height:13px;border-radius:50%;
    background:var(--night);border:2px solid var(--raven);
    transition:border-color 0.3s, box-shadow 0.3s;
  }
  .entry.milestone::before{
    border-color:var(--ember);
    box-shadow:0 0 0 4px rgba(201,162,94,0.12);
  }
  .entry-card{
    background:var(--night-2);border:1px solid var(--line);
    border-radius:14px;padding:26px 28px;
    transition:border-color 0.35s, transform 0.35s;
  }
  .entry-card:hover{border-color:rgba(125,163,204,0.32);transform:translateY(-2px)}
  .entry-meta{display:flex;gap:14px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
  .entry-date{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ice-dim);letter-spacing:0.04em}
  .tag{
    font-family:'JetBrains Mono',monospace;font-size:10.5px;
    text-transform:uppercase;letter-spacing:0.12em;
    padding:4px 11px;border-radius:100px;border:1px solid var(--line);
  }
  .tag-rapport{color:var(--raven-glow);border-color:rgba(125,163,204,0.4)}
  .tag-milepael{color:var(--ember);border-color:rgba(201,162,94,0.4)}
  .tag-bilde{color:var(--ice-dim)}
  .entry-car{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ice-dim);margin-left:auto}
  .entry-card h3{font-family:'Fraunces',serif;font-weight:500;font-size:23px;line-height:1.2;margin-bottom:10px}
  .entry-card p{color:var(--ice-dim);font-size:15.5px}
  .entry-img{
    width:100%;border-radius:10px;margin-top:18px;display:block;
    border:1px solid var(--line);background:var(--night);
  }
  .entry-link{
    display:inline-block;margin-top:16px;
    font-family:'JetBrains Mono',monospace;font-size:13px;
    color:var(--raven-glow);text-decoration:none;
    border-bottom:1px solid rgba(125,163,204,0.3);padding-bottom:2px;
    transition:border-color 0.3s;
  }
  .entry-link:hover{border-color:var(--raven-glow)}

  .empty{
    text-align:center;padding:70px 0;color:var(--ice-dim);
    font-family:'JetBrains Mono',monospace;font-size:14px;
  }

  footer{padding:46px 0;border-top:1px solid var(--line);color:var(--ice-dim);font-size:13px}
  footer .wrap{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px}
  .mono.dim{color:var(--ice-dim);font-size:12px}

  .reveal{opacity:0;transform:translateY(18px)}
  .reveal.in{opacity:1;transform:none;transition:opacity 0.7s ease,transform 0.7s cubic-bezier(.2,.8,.2,1)}

  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.reveal{opacity:1;transform:none}}
  @media(max-width:620px){.loghead{padding:54px 0 36px}.entry{padding-left:40px}}
</style>
</head>
<body>

<nav class="topnav">
  <a href="index.html" class="topnav-link">← Munin</a>
  <span class="topnav-brand">FREMGANG</span>
</nav>

<header class="loghead">
  <div class="wrap">
    <p class="eyebrow">Loggbok</p>
    <h1>Hva Munin <em>har sett</em>.</h1>
    <p>En åpen logg over utviklingen — rapporter fra ekte kjøreturer, milepæler i systemet, og funn underveis. Oppdateres etter hvert som arbeidet skrider frem.</p>
    <div class="filters" id="filters">
      <button class="filter active" data-f="alle">Alle</button>
      <button class="filter" data-f="rapport">Rapporter</button>
      <button class="filter" data-f="milepael">Milepæler</button>
      <button class="filter" data-f="bilde">Bilder</button>
    </div>
  </div>
</header>

<main class="wrap">
  <div class="timeline" id="timeline"></div>
</main>

<footer>
  <div class="wrap">
    <span class="mono">MUNIN · DIAGNOSTICS</span>
    <span class="mono dim">Selvlærende bildiagnostikk · bygget i Norge</span>
  </div>
</footer>

<script>
  /* ───────────────────────────────────────────────────────────
     FREMGANGSLOGG — rediger denne listen for å legge til oppføringer.
     Nyeste øverst. Felter:
       dato     — vises som den er, f.eks. "Juni 2026"
       type     — "rapport" | "milepael" | "bilde"
       tittel   — overskrift
       bil      — valgfritt, f.eks. "Freelander 2 · TD4" (utelat med "")
       tekst    — beskrivelse
       bilde    — valgfri filsti, f.eks. "images/logg/tur-01.jpg" (utelat med "")
       lenke    — valgfri { tekst, url } for f.eks. en PDF-rapport (utelat med null)
     ─────────────────────────────────────────────────────────── */
  const LOGG = [
    {
      dato:"Juni 2026",
      type:"milepael",
      tittel:"NPU-laget lærer å kjenne sin egen normaltilstand",
      bil:"",
      tekst:"Et nytt anker-prinsipp lar systemet oppdage når dets egen forståelse av «normalt» sakte forskyves — slik at en gradvis feil ikke blir lært inn som frisk tilstand. Under veitesting.",
      bilde:"",
      lenke:null
    },
    {
      dato:"Juni 2026",
      type:"rapport",
      tittel:"Termostatsignatur bekreftet i ekte data",
      bil:"Freelander 2 · TD4",
      tekst:"En lekkende termostat ga seg til kjenne i kjølevæsketemperaturen lenge før den ville utløst en feilkode. Munin fanget mønsteret i de langsomme temperaturkurvene under kjøring.",
      bilde:"",
      lenke:null
    },
    {
      dato:"Mai 2026",
      type:"bilde",
      tittel:"Munin om bord",
      bil:"",
      tekst:"Systemet kjører på en Raspberry Pi 5 med dedikert AI-akselerator, koblet til bilens OBD-port. Passiv tilkobling — det lytter, det styrer aldri.",
      bilde:"",
      lenke:null
    }
  ];

  const tl=document.getElementById('timeline');
  const TAGTXT={rapport:"Rapport",milepael:"Milepæl",bilde:"Bilde"};

  function render(filter){
    const items=LOGG.filter(e=>filter==='alle'||e.type===filter);
    if(items.length===0){
      tl.innerHTML='<div class="empty">Ingen oppføringer her ennå.</div>';
      return;
    }
    tl.innerHTML=items.map(e=>`
      <article class="entry reveal ${e.type==='milepael'?'milestone':''}">
        <div class="entry-card">
          <div class="entry-meta">
            <span class="entry-date">${e.dato}</span>
            <span class="tag tag-${e.type}">${TAGTXT[e.type]||e.type}</span>
            ${e.bil?`<span class="entry-car">${e.bil}</span>`:''}
          </div>
          <h3>${e.tittel}</h3>
          <p>${e.tekst}</p>
          ${e.bilde?`<img class="entry-img" src="${e.bilde}" alt="${e.tittel}" loading="lazy">`:''}
          ${e.lenke?`<a class="entry-link" href="${e.lenke.url}">${e.lenke.tekst} →</a>`:''}
        </div>
      </article>
    `).join('');
    observe();
  }

  let io;
  function observe(){
    if(io)io.disconnect();
    io=new IntersectionObserver((es)=>{
      es.forEach(x=>{if(x.isIntersecting){x.target.classList.add('in');io.unobserve(x.target)}})
    },{threshold:0.1});
    document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
  }

  document.getElementById('filters').addEventListener('click',ev=>{
    const b=ev.target.closest('.filter');if(!b)return;
    document.querySelectorAll('.filter').forEach(f=>f.classList.remove('active'));
    b.classList.add('active');
    render(b.dataset.f);
  });

  render('alle');
</script>
</body>
</html>
